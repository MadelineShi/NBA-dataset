<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}HoopBase{% endblock %}</title>
  {% block head %}{% endblock %}
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <nav class="navbar">
    <div class="nav-left">
      <a class="logo" href="/">🏀 HoopBase</a>
      <a href="/search">Players</a>
      <a href="/compare">Compare</a>
      <a href="/teams">Teams</a>
      <a href="/leaderboards">Leaderboards</a>
    </div>
  
    <div class="nav-right">
      <input id="nav-search" placeholder="Search player..." />
    </div>
  </nav>
<div class="container">{% block content %}{% endblock %}</div>
</body>
</html>

<script>
  document.getElementById("nav-search").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
          const query = this.value;
          window.location.href = "/search?q=" + encodeURIComponent(query);
      }
  });
  
  </script>

<script>
  let index = 0;
  const track = document.getElementById("track");
  const images = track.children;
  
  function updateCarousel() {
      track.style.transform = `translateX(-${index * 440}px)`;
  
      for (let i = 0; i < images.length; i++) {
          images[i].classList.remove("active");
      }
      images[index].classList.add("active");
  }
  
  function nextSlide() {
      index = (index + 1) % images.length;
      updateCarousel();
  }
  
  function prevSlide() {
      index = (index - 1 + images.length) % images.length;
      updateCarousel();
  }
  
  updateCarousel();
  </script>

<script>
const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for (let i = 0; i < 80; i++) {
    dots.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: 0.3,
        dy: 0.3
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    dots.forEach(dot => {
        dot.x += dot.dx;
        dot.y += dot.dy;

        /* 关键：循环回左上 */
        if (dot.x > canvas.width) dot.x = 0;
        if (dot.y > canvas.height) dot.y = 0;

        ctx.beginPath();
        ctx.arc(dot.x, dot.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = "#bbb";
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>
