{% extends "base.html" %}
{% block title %}Teams — HoopBase{% endblock %}
{% block content %}
<h1>All Teams</h1>
<div class="card" style="padding:0;overflow:auto;">
  <table>
    <thead><tr><th>Team</th><th>Total Pts</th><th>FG%</th><th>Total Shots</th><th>Games</th></tr></thead>
    <tbody>
      {% for t in teams %}
      <tr>
        <td><a href="/team/{{ t.team }}">{{ t.team }}</a></td>
        <td>{{ t.total_pts }}</td>
        <td>{{ t.fg_pct }}%</td>
        <td>{{ t.total_shots }}</td>
        <td>{{ t.games }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
